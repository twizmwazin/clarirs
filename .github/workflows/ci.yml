name: "CI"
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Formatting & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          rustflags: ""

      - name: Rustfmt Check
        id: rustfmt
        uses: actions-rust-lang/rustfmt@v1
        continue-on-error: true

      - name: Install ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - name: Clippy Check
        id: clippy
        run: cargo clippy --all-features -- -D warnings
        continue-on-error: true
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          CMAKE_C_COMPILER_LAUNCHER: "sccache"
          CMAKE_CXX_COMPILER_LAUNCHER: "sccache"
          CMAKE_MSVC_DEBUG_INFORMATION_FORMAT: Embedded
          CMAKE_POLICY_CMP0141: NEW
          CMAKE_GENERATOR: Ninja
          CC: "clang"
          CXX: "clang++"

      - name: Check results
        if: steps.rustfmt.outcome == 'failure' || steps.clippy.outcome == 'failure'
        run: exit 1

  test:
    name: Rust Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      # Z3 4.16 (bundled via z3-src) uses std::format/std::to_chars, which
      # Apple's libc++ only exposes on macOS 13.3+. Ignored on other platforms.
      MACOSX_DEPLOYMENT_TARGET: "13.3"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: matrix.os == 'windows-latest'

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          # Salt the Z3 build cache on every OS. The compiler differs per run
          # config (here: unset CC/CXX -> each OS's default), and CMake
          # reconfigures a cached build dir in place on a compiler change, which
          # trips on z3-src's stripped-out examples/ directory. A fresh key
          # avoids restoring a target/ built with a different compiler.
          cache-key: z3-defaults-v1

      - name: Install ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - name: Build
        run: cargo build --all-features
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          # Don't run the C/C++ (Z3) build through sccache on Windows. sccache
          # can't cache MSVC's /Zi separate-PDB output (Z3 needs cmake >= 3.25
          # for the /Z7 Embedded format, but ships 3.16), and wrapping cl breaks
          # the /FS PDB coordination, so parallel compiles abort with C1041.
          # Build Z3 with cl directly; Rust still uses sccache via RUSTC_WRAPPER.
          CMAKE_C_COMPILER_LAUNCHER: ${{ matrix.os != 'windows-latest' && 'sccache' || '' }}
          CMAKE_CXX_COMPILER_LAUNCHER: ${{ matrix.os != 'windows-latest' && 'sccache' || '' }}
          CMAKE_MSVC_DEBUG_INFORMATION_FORMAT: Embedded
          CMAKE_POLICY_CMP0141: NEW
          CMAKE_GENERATOR: Ninja
          # No CC/CXX override: each platform uses its default C/C++ compiler --
          # MSVC cl on Windows, Apple clang on macOS, gcc on Linux. cl is what
          # z3-src/Z3 require on Windows (it enables exceptions and emits
          # libz3.lib); clang/clang++ there built a GNU libz3.a the windows-msvc
          # target couldn't link.
          #
          # Force /Z7 (debug info embedded in each .obj) on Windows via cl's _CL_
          # variable, whose options are appended after the command line so /Z7
          # wins over CMake's default Debug /Zi. This avoids the per-target
          # vc140.pdb that the parallel compiles otherwise share -- which aborts
          # with C1041 and stalls mspdbsrv. (CMAKE_MSVC_DEBUG_INFORMATION_FORMAT
          # above can't achieve it: that needs CMP0141=NEW / cmake >= 3.25, but
          # Z3 ships cmake 3.16.)
          _CL_: ${{ matrix.os == 'windows-latest' && '/Z7' || '' }}

      - name: Run tests
        run: cargo test --all-features --no-fail-fast

  build-wheels:
    name: Python Wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      # Z3 4.16 (bundled via z3-src) requires macOS 13.3+ (std::format/to_chars);
      # this also tags the macOS wheels accordingly. Ignored on other platforms.
      MACOSX_DEPLOYMENT_TARGET: "13.3"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10"]
        include:
          - os: ubuntu-latest
            python-version: "3.14"
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: matrix.os == 'windows-latest'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # See the test job: salt the Z3 build cache on every OS so a cached
          # target/ isn't reconfigured in place after the CC/CXX change.
          cache-key: z3-defaults-v1

      - name: Install ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - name: Install Maturin
        run: pip install maturin

      - name: Build Wheel
        run: maturin build --release -o dist
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          # See the test job: skip the sccache launcher for the Windows C/C++
          # (Z3) build so cl manages its PDB directly.
          CMAKE_C_COMPILER_LAUNCHER: ${{ matrix.os != 'windows-latest' && 'sccache' || '' }}
          CMAKE_CXX_COMPILER_LAUNCHER: ${{ matrix.os != 'windows-latest' && 'sccache' || '' }}
          CMAKE_MSVC_DEBUG_INFORMATION_FORMAT: Embedded
          CMAKE_POLICY_CMP0141: NEW
          CMAKE_GENERATOR: Ninja
          # No CC/CXX override: cl on Windows (which z3-src/Z3 require -- it emits
          # libz3.lib and enables exceptions), Apple clang on macOS, gcc on Linux.
          # Force /Z7 embedded debug info on Windows via cl's _CL_ append variable
          # so parallel compiles don't share a vc140.pdb (C1041 / mspdbsrv stall);
          # see the test job.
          _CL_: ${{ matrix.os == 'windows-latest' && '/Z7' || '' }}
          # maturin doesn't propagate MACOSX_DEPLOYMENT_TARGET into the vendored
          # Z3 cmake build the way plain cargo does, so cc-rs emits a versionless
          # --target=arm64-apple-macosx that makes clang resolve libc++
          # availability to "unknown" and reject std::to_chars/std::format (Z3
          # 4.16). These wheels need macOS 13.3+ anyway, so disable libc++'s
          # availability annotations.
          CXXFLAGS: ${{ matrix.os == 'macos-latest' && '-D_LIBCPP_DISABLE_AVAILABILITY' || '' }}

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

name: "CI"
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Formatting & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          rustflags: ""

      - name: Rustfmt Check
        id: rustfmt
        uses: actions-rust-lang/rustfmt@v1
        continue-on-error: true

      - name: Install ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - name: Clippy Check
        id: clippy
        run: cargo clippy --all-features -- -D warnings
        continue-on-error: true
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          CMAKE_C_COMPILER_LAUNCHER: "sccache"
          CMAKE_CXX_COMPILER_LAUNCHER: "sccache"
          CMAKE_MSVC_DEBUG_INFORMATION_FORMAT: Embedded
          CMAKE_POLICY_CMP0141: NEW
          CMAKE_GENERATOR: Ninja
          CC: "clang"
          CXX: "clang++"

      - name: Check results
        if: steps.rustfmt.outcome == 'failure' || steps.clippy.outcome == 'failure'
        run: exit 1

  test:
    name: Rust Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      # Z3 4.16 (bundled via z3-src) uses std::format/std::to_chars, which
      # Apple's libc++ only exposes on macOS 13.3+. Ignored on other platforms.
      MACOSX_DEPLOYMENT_TARGET: "13.3"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: matrix.os == 'windows-latest'

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          # Salt the Z3 build cache: a compiler change makes CMake reconfigure a
          # cached build dir, which fails on z3-src's stripped examples/ dir.
          cache-key: z3-defaults-v1

      - name: Install ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - name: Build
        run: cargo build --all-features
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          # No sccache for the Windows C/C++ build (it can't cache MSVC /Zi PDB
          # output); cl runs directly there, Rust still uses sccache.
          CMAKE_C_COMPILER_LAUNCHER: ${{ matrix.os != 'windows-latest' && 'sccache' || '' }}
          CMAKE_CXX_COMPILER_LAUNCHER: ${{ matrix.os != 'windows-latest' && 'sccache' || '' }}
          CMAKE_MSVC_DEBUG_INFORMATION_FORMAT: Embedded
          CMAKE_POLICY_CMP0141: NEW
          CMAKE_GENERATOR: Ninja
          # No CC/CXX override -> each OS's default compiler: cl on Windows
          # (z3-src needs it for libz3.lib + exceptions), clang on macOS, gcc on
          # Linux. On Windows, force /Z7 (debug info embedded in each .obj) via
          # cl's _CL_ append variable so it wins over CMake's Debug /Zi; this
          # avoids a shared per-target vc140.pdb (C1041 / mspdbsrv stall).
          _CL_: ${{ matrix.os == 'windows-latest' && '/Z7' || '' }}

      - name: Run tests
        run: cargo test --all-features --no-fail-fast

  build-wheels:
    name: Python Wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      # Z3 4.16 (bundled via z3-src) requires macOS 13.3+ (std::format/to_chars);
      # this also tags the macOS wheels accordingly. Ignored on other platforms.
      MACOSX_DEPLOYMENT_TARGET: "13.3"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10"]
        include:
          - os: ubuntu-latest
            python-version: "3.14"
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: matrix.os == 'windows-latest'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # See the test job: salt the Z3 build cache against compiler changes.
          cache-key: z3-defaults-v1

      - name: Install ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - name: Install Maturin
        run: pip install maturin

      - name: Build Wheel
        run: maturin build --release -o dist
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          # See the test job: no sccache for the Windows C/C++ build.
          CMAKE_C_COMPILER_LAUNCHER: ${{ matrix.os != 'windows-latest' && 'sccache' || '' }}
          CMAKE_CXX_COMPILER_LAUNCHER: ${{ matrix.os != 'windows-latest' && 'sccache' || '' }}
          CMAKE_MSVC_DEBUG_INFORMATION_FORMAT: Embedded
          CMAKE_POLICY_CMP0141: NEW
          CMAKE_GENERATOR: Ninja
          # See the test job: default compilers, plus /Z7 embedded debug info on
          # Windows via _CL_ to avoid a shared vc140.pdb (C1041).
          _CL_: ${{ matrix.os == 'windows-latest' && '/Z7' || '' }}
          # maturin drops MACOSX_DEPLOYMENT_TARGET from the Z3 build, so libc++
          # rejects to_chars/format (Z3 4.16); disable its availability checks.
          CXXFLAGS: ${{ matrix.os == 'macos-latest' && '-D_LIBCPP_DISABLE_AVAILABILITY' || '' }}

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

name: "CI"
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Formatting & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          rustflags: ""

      - name: Rustfmt Check
        id: rustfmt
        uses: actions-rust-lang/rustfmt@v1
        continue-on-error: true

      - name: Install ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - name: Clippy Check
        id: clippy
        run: cargo clippy --all-features -- -D warnings
        continue-on-error: true
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          CMAKE_C_COMPILER_LAUNCHER: "sccache"
          CMAKE_CXX_COMPILER_LAUNCHER: "sccache"
          CMAKE_MSVC_DEBUG_INFORMATION_FORMAT: Embedded
          CMAKE_POLICY_CMP0141: NEW
          CMAKE_GENERATOR: Ninja
          CC: "clang"
          CXX: "clang++"

      - name: Check results
        if: steps.rustfmt.outcome == 'failure' || steps.clippy.outcome == 'failure'
        run: exit 1

  test:
    name: Rust Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      # Z3 4.16 (bundled via z3-src) uses std::format/std::to_chars, which
      # Apple's libc++ only exposes on macOS 13.3+. Ignored on other platforms.
      MACOSX_DEPLOYMENT_TARGET: "13.3"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: matrix.os == 'windows-latest'

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          # Windows builds Z3 with MSVC cl (see the Build step). Salt its cache
          # key by build config so we never reconfigure a cached target/ in
          # place after a compiler/launcher change (CMake then re-runs and trips
          # on z3-src's stripped-out examples/ directory).
          cache-key: ${{ matrix.os == 'windows-latest' && 'z3-msvc-v2' || '' }}

      - name: Install ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - name: Build
        run: cargo build --all-features
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          # Don't run the C/C++ (Z3) build through sccache on Windows. sccache
          # can't cache MSVC's /Zi separate-PDB output (Z3 needs cmake >= 3.25
          # for the /Z7 Embedded format, but ships 3.16), and wrapping cl breaks
          # the /FS PDB coordination, so parallel compiles abort with C1041.
          # Build Z3 with cl directly; Rust still uses sccache via RUSTC_WRAPPER.
          CMAKE_C_COMPILER_LAUNCHER: ${{ matrix.os == 'windows-latest' && '' || 'sccache' }}
          CMAKE_CXX_COMPILER_LAUNCHER: ${{ matrix.os == 'windows-latest' && '' || 'sccache' }}
          CMAKE_MSVC_DEBUG_INFORMATION_FORMAT: Embedded
          CMAKE_POLICY_CMP0141: NEW
          CMAKE_GENERATOR: Ninja
          # On Windows build Z3 with the native MSVC compiler (cl). z3-src and
          # Z3's CMake are written for MSVC there: it enables C++ exceptions
          # (/EHsc) and names the static library `libz3.lib`, which is what
          # z3-src's `rustc-link-lib=static=libz3` expects. clang/clang++ (GNU
          # driver) instead builds a libz3.a the windows-msvc target can't find,
          # and clang-cl is detected as Clang — Z3 applies GNU flags but keeps
          # the MSVC driver's exceptions-off default, so Z3's `throw`s fail.
          CC: ${{ matrix.os == 'windows-latest' && 'cl' || 'clang' }}
          CXX: ${{ matrix.os == 'windows-latest' && 'cl' || 'clang++' }}
          # cl writes a shared per-target vc140.pdb, so parallel compiles race on
          # it (fatal error C1041). /FS forces synchronized PDB writes.
          CFLAGS: ${{ matrix.os == 'windows-latest' && '/FS' || '' }}
          CXXFLAGS: ${{ matrix.os == 'windows-latest' && '/FS' || '' }}

      - name: Run tests
        run: cargo test --all-features --no-fail-fast

  build-wheels:
    name: Python Wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      # Z3 4.16 (bundled via z3-src) requires macOS 13.3+ (std::format/to_chars);
      # this also tags the macOS wheels accordingly. Ignored on other platforms.
      MACOSX_DEPLOYMENT_TARGET: "13.3"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10"]
        include:
          - os: ubuntu-latest
            python-version: "3.14"
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: matrix.os == 'windows-latest'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # See the test job: salt the Windows cache key by build config so a
          # cached target/ isn't reconfigured in place after a config change.
          cache-key: ${{ matrix.os == 'windows-latest' && 'z3-msvc-v2' || '' }}

      - name: Install ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - name: Install Maturin
        run: pip install maturin

      - name: Build Wheel
        run: maturin build --release -o dist
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          # See the test job: skip the sccache launcher for the Windows C/C++
          # (Z3) build so cl manages its PDB directly.
          CMAKE_C_COMPILER_LAUNCHER: ${{ matrix.os == 'windows-latest' && '' || 'sccache' }}
          CMAKE_CXX_COMPILER_LAUNCHER: ${{ matrix.os == 'windows-latest' && '' || 'sccache' }}
          CMAKE_MSVC_DEBUG_INFORMATION_FORMAT: Embedded
          CMAKE_POLICY_CMP0141: NEW
          CMAKE_GENERATOR: Ninja
          # Native MSVC cl on Windows (see the test job): MSVC mode gives Z3
          # working exceptions and the libz3.lib name z3-src links against.
          CC: ${{ matrix.os == 'windows-latest' && 'cl' || 'clang' }}
          CXX: ${{ matrix.os == 'windows-latest' && 'cl' || 'clang++' }}
          # maturin does not propagate MACOSX_DEPLOYMENT_TARGET into the vendored
          # Z3 cmake build the way plain `cargo` does, so cc-rs emits a
          # versionless `--target=arm64-apple-macosx` that makes clang resolve
          # libc++ availability to "unknown" and reject std::to_chars/std::format
          # (used by Z3 4.16). These wheels require macOS 13.3+ regardless, so
          # disable libc++'s availability annotations for the Z3 build. On
          # Windows, /FS forces synchronized PDB writes so parallel cl invocations
          # don't race on the shared vc140.pdb (fatal error C1041).
          CFLAGS: ${{ matrix.os == 'windows-latest' && '/FS' || '' }}
          CXXFLAGS: ${{ matrix.os == 'macos-latest' && '-D_LIBCPP_DISABLE_AVAILABILITY' || matrix.os == 'windows-latest' && '/FS' || '' }}

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
